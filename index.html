<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام PassSafe - مشروع جامعة بابل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="login-section">
            <h1>🔐 PassSafe</h1>
            <p>نظام إدارة كلمات المرور الآمن</p>
            <input type="password" id="master-pass" placeholder="أدخل رمز الدخول (1234)">
            <button onclick="unlock()" id="login-btn">دخول للنظام</button>
            
            <div class="team-info">
                <p>فريق العمل:</p>
                <span>جعفر سيف</span> | <span>فاطمة محمد</span> | <span>زهراء فائق</span>
                <p>جامعة بابل - تقنية المعلومات</p>
            </div>
        </div>

        <div id="main-content" style="display:none;">
            <h2>خزان كلمات المرور</h2>
            <div class="input-group">
                <input type="text" id="site-name" placeholder="اسم الموقع (مثلاً: فيسبوك)">
                <input type="password" id="site-pass" placeholder="كلمة المرور">
                <button onclick="saveData()">تشفير وحفظ</button>
            </div>
            <hr>
            <ul id="password-list"></ul>
            <button onclick="location.reload()" style="background:#666;">خروج آمن</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
